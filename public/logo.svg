<svg version="1.1" viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- Zorua: a stylized eye/mask shape evoking transformation and illusion -->
  <!-- Outer dark shape — fox-ear silhouette -->
  <polygon points="50,4 20,28 10,70 50,92 90,70 80,28" fill="#8b1a1a"/>
  <!-- Inner mask / face shape -->
  <ellipse cx="50" cy="58" rx="28" ry="22" fill="#1a0a0a"/>
  <!-- Left eye glow -->
  <ellipse cx="37" cy="54" rx="8" ry="9" fill="#cc2222"/>
  <ellipse cx="37" cy="54" rx="4" ry="5" fill="#ff4444"/>
  <ellipse cx="35" cy="52" rx="1.5" ry="2" fill="#ffaaaa"/>
  <!-- Right eye glow -->
  <ellipse cx="63" cy="54" rx="8" ry="9" fill="#cc2222"/>
  <ellipse cx="63" cy="54" rx="4" ry="5" fill="#ff4444"/>
  <ellipse cx="61" cy="52" rx="1.5" ry="2" fill="#ffaaaa"/>
  <!-- Ear tips -->
  <polygon points="26,28 18,8 38,22" fill="#6b1212"/>
  <polygon points="74,28 82,8 62,22" fill="#6b1212"/>
  <!-- Subtle nose -->
  <ellipse cx="50" cy="66" rx="3" ry="2" fill="#cc2222" opacity="0.7"/>
</svg>
